<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position 예제 연습</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        p{
            width: 200px;
            height: 200px;
            background-color: aquamarine;
        }
        .box1{
            position: absolute;
            top: 0px;
            left: 0px;
        }
        .box2{
            position: absolute;
            top: 0px;
            right: 0px;
        }
        .box3{
            position: absolute;
            bottom: 0px;
            left: 0px;
        }
        .box4{
            position: absolute;
            bottom: 0px;
            right: 0px
        }
        .box5{
            position: absolute;
            top: 50%;
            left: 50%;
            transform:translate(-50% , -50%) ;
        }
        .box6{
            width: 100px;
            height: 100px;
            position: absolute;
            top: 50%;
            transform: translate(0 , -50%);
            background-color: brown;
        }
        .box7{
            width: 100px;
            height: 100px;
            position: absolute;
            top: 50%;
            right: 0px;
            transform: translate(0 , -50%);
            background-color: rgb(42, 61, 165);
        }
        .box8{
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0px;
            left: 50%;
            transform: translate(-50% , 0);
            background-color: darkmagenta;
        }
        .box9{
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translate(-50% , 0);
            background-color: cornflowerblue;
        }
    </style>
</head>
<body>
    <p class="box1"></p>
    <p class="box2"></p>
    <p class="box3"></p>
    <p class="box4"></p>
    <p class="box5"></p>
    <p class="box6"></p>
    <p class="box7"></p>
    <p class="box8"></p>
    <p class="box9"></p>

</body>
</html>
